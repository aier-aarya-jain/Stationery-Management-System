server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Define routing rules for our microservices
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**
        - id: inventory-service
          uri: lb://inventory-service
          predicates:
            - Path=/api/inventory/**
        - id: request-service
          uri: lb://request-service
          predicates:
            - Path=/api/requests/**

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

# Expose actuator endpoints for potential health checks in Docker/Jenkins
management:
  endpoints:
    web:
      exposure:
        include: "health,info"
