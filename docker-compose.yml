# docker-compose.yml — Stationery Management System Infrastructure

# Port Mapping (host:container):
#   3306  → MySQL Database
#   8888  → Config Server
#   8761  → Eureka Service Registry
#   8085  → API Gateway (single entry point for all frontend requests)

version: '3.8'

services:

  # -------------------------------------------------------
  # MySQL — Primary database for all three microservices.
  # -------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: stationery_mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql:/docker-entrypoint-initdb.d # Loads the DB init scripts
    networks:
      - stationery-net

  # -------------------------------------------------------
  # Config Server — Centralized configuration management.
  # -------------------------------------------------------
  config-server:
    build: ./backend/config-server
    container_name: config-server
    restart: always
    ports:
      - "8888:8888"
    volumes:
      - ./backend/config-repo:/config-repo
    networks:
      - stationery-net
    depends_on:
      - mysql

  # -------------------------------------------------------
  # Eureka Server — Service registry for dynamic service discovery.
  # -------------------------------------------------------
  eureka-server:
    build: ./backend/eureka-server
    container_name: eureka-server
    restart: always
    ports:
      - "8761:8761"
    networks:
      - stationery-net
    depends_on:
      - config-server

  # -------------------------------------------------------
  # API Gateway — Single entry point for all client requests.
  # -------------------------------------------------------
  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    restart: always
    ports:
      - "8085:8080"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
    networks:
      - stationery-net
    depends_on:
      - eureka-server
      - config-server

  # -------------------------------------------------------
  # Auth Service — Handles user registration and login.
  # -------------------------------------------------------
  auth-service:
    build: ./backend/auth-service
    container_name: auth-service
    restart: always
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_PASS=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
    networks:
      - stationery-net
    depends_on:
      - mysql
      - eureka-server
      - config-server

  # -------------------------------------------------------
  # Inventory Service — Manages stationery stock.
  # -------------------------------------------------------
  inventory-service:
    build: ./backend/inventory-service
    container_name: inventory-service
    restart: always
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_PASS=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
    networks:
      - stationery-net
    depends_on:
      - mysql
      - eureka-server
      - config-server

  # -------------------------------------------------------
  # Request Service — Manages student stationery requests.
  # -------------------------------------------------------
  request-service:
    build: ./backend/request-service
    container_name: request-service
    restart: always
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_PASS=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CONFIG_IMPORT=optional:configserver:http://config-server:8888/
    networks:
      - stationery-net
    depends_on:
      - mysql
      - eureka-server
      - config-server

  # -------------------------------------------------------
  # Frontend Service — React App
  # -------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: frontend
    restart: always
    ports:
      - "3000:80"
    networks:
      - stationery-net
    depends_on:
      - api-gateway

# Shared bridge network
networks:
  stationery-net:
    driver: bridge

# Named volume
volumes:
  mysql_data:
